<!DOCTYPE html>
<html>
  <head>
    <title>JSON engine playground</title>

    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif
        background: #f4f6f8;
        padding: 30px;
        color: #333;
      }

      h2 {
        margin-bottom: 10px;
      }

      #controls {
        margin-bottom: 20px;
      }

      button {
        padding: 8px 14px;
        margin-right: 10px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      button:active {
        transform: translateY(1px);
      }

      #state {
        background: white;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 12px;
        font-family: monospace;
        margin-bottom: 20px;
      }

      #log {
        background: #111;
        color: #00ff9c;
        padding: 12px;
        border-radius: 6px;
        max-height: 220px;
        overflow-y: auto;
        font-family: monospace;
        white-space: pre-wrap;
      }
      </style>
  </head>
  <body>
    <h2>JSON Engine Playground</h2>

    <div>
      <button id="add">Update counter</button>
      <button id="undo">Undo</button>
      <button id="redo">Redo</button>
      <button id="batch">Batch Update</button>
    </div>

    <h3>State</h3>
    <pre id="state"></pre>

    <h3>Change Log</h3>
    <pre id="log"></pre>

    <script type="module" src="./main.js"></script>
  </body>
</html>
